APPLY_FIXES: all

PRE_COMMANDS:
  - command: cat /etc/os-release

PYTHON_PYLINT_CONFIG_FILE: pyproject.toml
PYTHON_PYLINT_ARGUMENTS: ""

DISABLE_LINTERS:
  - SPELL_CSPELL
  - PYTHON_PYRIGHT # Reenable once the backend facade has stable type stubs.
  - PYTHON_PYLINT # Disabled on PRs because the linter image does not install the project dependency stack.
  - PYTHON_MYPY # Disabled on PRs until the tooling package layout has stable mypy module roots.
  - PYTHON_BANDIT # Keep security scanning in CodeQL; Bandit reports branch-wide legacy findings here.
  - PYTHON_FLAKE8 # Ruff is the maintained style checker for local development.
  - PYTHON_RUFF # Disabled in MegaLinter until generated branch-wide fixes are reconciled manually.
  - REPOSITORY_DEVSKIM
  - REPOSITORY_TRIVY # Reenable as soon as (if?) https://avd.aquasec.com/nvd/2021/cve-2021-29063/ confirms that 1.3.0 is no longer a risk
  - REPOSITORY_OSV_SCANNER # Dependency vulnerability tracking is handled outside this patch PR.
  - JSON_JSONLINT # Disable because there is only .devcontainer.json, for which it throws an unwanted warning
  - MAKEFILE_CHECKMAKE # Not using a Makefile
  - SPELL_LYCHEE # Takes pretty long
  - REPOSITORY_GRYPE # Throws false positives

FILTER_REGEX_EXCLUDE: '(^\.github/workflows/)'
