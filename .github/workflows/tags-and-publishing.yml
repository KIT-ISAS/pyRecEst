name: Check for version change, add tag, build, and publish

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [closed]
    branches:
      - main
  #checkov:skip=CKV_GHA_7:workflow_dispatch inputs are intentional for manual release control
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only; do not push a tag or create/update a GitHub release"
        required: true
        type: boolean
        default: true
      release_notes_mode:
        description: "How to generate release notes for manual runs"
        required: true
        type: choice
        default: github
        options:
          - github
          - copilot

permissions:
  contents: write

jobs:
  check_if_tag_exists:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    outputs:
      tag_version: ${{ steps.extract_version_and_check_tag.outputs.tag_version }}
      tag_exists: ${{ steps.extract_version_and_check_tag.outputs.tag_exists }}
      dry_run: ${{ steps.set_mode.outputs.dry_run }}
      release_notes_mode: ${{ steps.set_mode.outputs.release_notes_mode }}
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}

      - name: Set mode
        id: set_mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_notes_mode=${{ inputs.release_notes_mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_notes_mode=copilot" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Extract version from pyproject.toml and check if tag exists
        id: extract_version_and_check_tag
        shell: bash
        run: |
          VERSION=$(python -c "import pathlib, tomllib; data = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8')); print(data['tool']['poetry']['version'])")
          EXISTS=$(git ls-remote --tags origin "refs/tags/${VERSION}" | wc -l | tr -d ' ')
          echo "tag_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_exists=${EXISTS}" >> "$GITHUB_OUTPUT"

      - name: Fail manual non-dry-run if tag already exists
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == false && steps.extract_version_and_check_tag.outputs.tag_exists == '1' }}
        shell: bash
        run: |
          echo "Tag ${{ steps.extract_version_and_check_tag.outputs.tag_version }} already exists."
          echo "Run this workflow with dry_run=true to test the pipeline without publishing."
          exit 1

  set_version_tag:
    needs: check_if_tag_exists
    runs-on: ubuntu-latest
    if: ${{ needs.check_if_tag_exists.outputs.dry_run != 'true' && needs.check_if_tag_exists.outputs.tag_exists != '1' }}
    outputs:
      tag_set: ${{ steps.create_tag.outputs.tag_set }}
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}

      - name: Create new tag
        id: create_tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.check_if_tag_exists.outputs.tag_version }}"
          git push origin "${{ needs.check_if_tag_exists.outputs.tag_version }}"
          echo "tag_set=true" >> "$GITHUB_OUTPUT"

  build_and_publish:
    needs:
      - check_if_tag_exists
      - set_version_tag
    runs-on: ubuntu-latest
    if: >-
      ${{
        always() &&
        needs.check_if_tag_exists.result == 'success' &&
        (
          needs.check_if_tag_exists.outputs.dry_run == 'true' ||
          needs.set_version_tag.result == 'success'
        )
      }}
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check_if_tag_exists.outputs.tag_version }}
      DRY_RUN: ${{ needs.check_if_tag_exists.outputs.dry_run }}
      RELEASE_NOTES_MODE: ${{ needs.check_if_tag_exists.outputs.release_notes_mode }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade poetry

      - name: Extract repository name
        shell: bash
        run: echo "REPO_NAME=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Find previous tag
        id: prev_tag
        shell: bash
        run: |
          PREV_TAG="$(git tag --sort=-version:refname | grep -vx "${VERSION}" | sed -n '1p' || true)"
          echo "tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Determine head ref for notes generation
        id: head_ref
        shell: bash
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Copilot release notes
        if: ${{ env.RELEASE_NOTES_MODE == 'copilot' && steps.prev_tag.outputs.tag != '' }}
        id: ai_notes
        uses: FlorianPfaff/copilot-release-notes@main
        with:
          base-ref: ${{ steps.prev_tag.outputs.tag }}
          head-ref: ${{ steps.head_ref.outputs.ref }}
          instructions: .github/release-notes-instructions.md
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COPILOT_TIMEOUT_MS: "900000"
          COPILOT_HEARTBEAT_MS: "30000"
          COPILOT_DEBUG_DIR: "${{ runner.temp }}/copilot-debug"
          COPILOT_SAVE_PROMPT: "false"

      - name: Write Copilot notes to file
        if: ${{ env.RELEASE_NOTES_MODE == 'copilot' && steps.prev_tag.outputs.tag != '' }}
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ${{ steps.ai_notes.outputs.release-notes }}
          EOF

      - name: Generate GitHub release notes
        if: ${{ env.RELEASE_NOTES_MODE == 'github' && steps.prev_tag.outputs.tag != '' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          TARGET_COMMITISH: ${{ steps.head_ref.outputs.ref }}
          PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.request

          payload = {
              "tag_name": os.environ["VERSION"],
              "target_commitish": os.environ["TARGET_COMMITISH"],
          }

          prev_tag = os.environ.get("PREV_TAG", "").strip()
          if prev_tag:
              payload["previous_tag_name"] = prev_tag

          for candidate in (".github/release.yml", ".github/release.yaml"):
              if pathlib.Path(candidate).exists():
                  payload["configuration_file_path"] = candidate
                  break

          req = urllib.request.Request(
              f'https://api.github.com/repos/{os.environ["OWNER"]}/{os.environ["REPO"]}/releases/generate-notes',
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f'Bearer {os.environ["GITHUB_TOKEN"]}',
                  "X-GitHub-Api-Version": "2026-03-10",
              },
              method="POST",
          )

          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          pathlib.Path("RELEASE_NOTES.md").write_text(
              data["body"].rstrip() + "\n",
              encoding="utf-8",
          )
          PY

      - name: Fallback notes for first release
        if: ${{ steps.prev_tag.outputs.tag == '' }}
        run: echo "Initial release." > RELEASE_NOTES.md

      - name: Build package
        run: python -m poetry build

      - name: Upload release notes artifact for dry runs
        if: ${{ env.DRY_RUN == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ env.VERSION }}
          path: RELEASE_NOTES.md

      - name: Show publish settings
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        run: |
          echo "DRY_RUN=${DRY_RUN}"
          echo "VERSION=${VERSION}"
          echo "GITHUB_SHA=${GITHUB_SHA}"
          echo "RELEASE_NOTES_MODE=${RELEASE_NOTES_MODE}"
          echo "PREV_TAG=${{ steps.prev_tag.outputs.tag }}"

      - name: Create GitHub Release and Upload Artifacts
        if: ${{ env.DRY_RUN != 'true' }}
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.VERSION }}
          commit: ${{ github.sha }}
          name: Release ${{ env.VERSION }}
          bodyFile: RELEASE_NOTES.md
          artifacts: ./dist/${{ env.REPO_NAME }}-${{ env.VERSION }}-py3-none-any.whl,./dist/${{ env.REPO_NAME }}-${{ env.VERSION }}.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true

      - name: Verify release was created
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        run: |
          if [ -z "${{ steps.create_release.outputs.html_url }}" ]; then
            echo "Release step finished but did not return a release URL."
            exit 1
          fi
          echo "Release created: ${{ steps.create_release.outputs.html_url }}"