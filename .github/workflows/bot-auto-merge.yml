name: Bot Auto-merge

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.head.ref == 'megalinter-fixes' &&
        startsWith(github.event.pull_request.title, '[MegaLinter] Apply linters automatic fixes')
      )

    steps:
      - name: Enable auto-merge
        run: gh pr merge --repo "${{ github.repository }}" --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}