name: Test workflow

permissions:
  contents: read
  checks: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install --only docs --no-root

      - name: Build documentation
        run: poetry run mkdocs build --strict
        env:
          PYTHONPATH: ${{ github.workspace }}/src

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        backend: [numpy, pytorch, jax]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install system build dependencies (when binary not available)
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              echo "Command failed on attempt ${attempt}; retrying..."
              sleep $((attempt * 20))
            done

            "$@"
          }

          retry sudo apt-get update
          retry sudo apt-get install -y \
            gfortran pkg-config ninja-build \
            libopenblas-dev liblapack-dev \
            libfftw3-dev libhealpix-cxx-dev

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry
          poetry env use python
          poetry install --extras "healpy_support"
          
      - name: Install pytorch specific dependencies afterward
        if: ${{ matrix.backend == 'pytorch' }}
        run: |
          poetry install --extras "healpy_support" --extras "pytorch_support"
          
      - name: Run tests
        run: |
          export PYRECEST_BACKEND=${{ matrix.backend }}
          poetry run python -m pytest --rootdir . -v --strict-config --junitxml=junit_test_results_${{ matrix.backend }}.xml ./tests
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Upload test result artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.backend }}-${{ matrix.python-version }}-test-results
          path: junit_test_results_${{ matrix.backend }}.xml

  publish-results:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - name: Download all test result artifacts
        uses: actions/download-artifact@v8
        with:
          path: test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            test-results/*/junit_test_results_*.xml
