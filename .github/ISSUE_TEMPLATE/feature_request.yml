name: Feature request
description: Request a new distribution, filter, tracker, backend operation, or documentation page.
title: "Feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What task would this feature enable?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API shape and expected behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - distributions
        - filters or smoothers
        - tracking or association
        - backend support
        - sampling or grids
        - evaluation or plotting
        - documentation
        - packaging or CI
  - type: textarea
    id: backend
    attributes:
      label: Backend expectations
      description: Which backends should support this feature, and with what limitations?
