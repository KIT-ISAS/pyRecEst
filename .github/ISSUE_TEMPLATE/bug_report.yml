name: Bug report
description: Report incorrect behavior in PyRecEst.
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Paste the smallest script or test case that demonstrates the issue.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PyRecEst version
      placeholder: "2.2.2"
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Active backend
      options:
        - numpy
        - pytorch
        - jax
        - not backend-specific
        - unknown
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Paste `pyrecest info` output if possible.
      render: json
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the traceback if there is one.
      render: text
